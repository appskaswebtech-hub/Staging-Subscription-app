# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "f90051b6e905ff35d1920efa4d6a5e1a"
name = "staging-kas-subscription"
application_url = "https://wherever-viewer-istanbul-mhz.trycloudflare.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  uri = "/webhooks"
  topics = [
  "subscription_contracts/update",
  "subscription_billing_attempts/success",
  "subscription_billing_attempts/failure",
  "subscription_contracts/create"
]
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "customer_read_customers,customer_read_own_subscription_contracts,customer_write_own_subscription_contracts,read_customer_payment_methods,read_customers,read_draft_orders,read_inventory,read_orders,read_own_subscription_contracts,read_products,read_purchase_options,write_customers,write_draft_orders,write_own_subscription_contracts,write_products,write_purchase_options"

[auth]
redirect_urls = [
  "https://wherever-viewer-istanbul-mhz.trycloudflare.com/api/auth"
]

[app_proxy]
url = "https://wherever-viewer-istanbul-mhz.trycloudflare.com"
subpath = "subscriptions"
prefix = "apps"
